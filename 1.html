<script type="text/javascript">
    $(function () {
        var dateTimeNow = $("#DateNow").val();
        var date = new Date(dateTimeNow);
        var year = date.getFullYear().toString();
      
        var opts1 = "";
        for (var i = -5; i <= 5; i++) {
            var tmpYear = (parseInt(year) + i).toString();
            var selected = (tmpYear == year) ? " selected=\"selected\"" : "";
            opts1 += "<option value=\"" + tmpYear + "\" " + selected + ">" + tmpYear + "</option>";
        }
        $("#Year").html(opts1);       
    })
</script>
